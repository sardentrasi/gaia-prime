{% extends "base.html" %}

{% block title %}Demeter — Reports{% endblock %}

{% block content %}
<div class="flex flex-col sm:flex-row sm:items-end justify-between gap-4 mb-6">
    <div>
        <h1 class="text-[40px] md:text-[56px] font-display uppercase">Reports</h1>
        <p class="text-[14px] font-bold text-[#868685] uppercase tracking-wider mt-3">Daily aggregated sensor summaries</p>
    </div>
</div>

<div class="bg-white rounded-[30px] p-6 md:p-8 shadow-[0_0_0_1px_rgba(14,15,12,0.12)]">
    <div class="overflow-x-auto custom-scroll">
        <table class="w-full min-w-[700px]">
            <thead>
                <tr class="border-b-2 border-[#e8ebe6]">
                    <th class="text-left py-4 px-3 text-[11px] font-bold uppercase tracking-wider text-[#868685]">Date</th>
                    <th class="text-left py-4 px-3 text-[11px] font-bold uppercase tracking-wider text-[#868685]">Readings</th>
                    <th class="text-left py-4 px-3 text-[11px] font-bold uppercase tracking-wider text-[#868685]">Irrigations</th>
                    <th class="text-left py-4 px-3 text-[11px] font-bold uppercase tracking-wider text-[#868685]">Avg Moisture</th>
                    <th class="text-left py-4 px-3 text-[11px] font-bold uppercase tracking-wider text-[#868685]">Avg Temp</th>
                    <th class="text-left py-4 px-3 text-[11px] font-bold uppercase tracking-wider text-[#868685]">Avg Humidity</th>
                    <th class="text-left py-4 px-3 text-[11px] font-bold uppercase tracking-wider text-[#868685]">Avg CO₂</th>
                </tr>
            </thead>
            <tbody id="reports-tbody">
                <tr><td colspan="7" class="text-center py-12 text-[14px] font-bold text-[#868685] uppercase tracking-wider">Loading...</td></tr>
            </tbody>
        </table>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
document.addEventListener('DOMContentLoaded', async () => {
    try {
        const res = await fetch('/api/reports');
        const data = await res.json();
        const tbody = document.getElementById('reports-tbody');

        if (data.length === 0) {
            tbody.innerHTML = '<tr><td colspan="7" class="text-center py-12 text-[14px] font-bold text-[#868685] uppercase tracking-wider">No data available yet</td></tr>';
            return;
        }

        tbody.innerHTML = '';
        data.forEach(row => {
            const irrigationBadge = row.irrigations > 0
                ? `<span class="inline-flex items-center gap-1 bg-[#e2f6d5] text-[#163300] px-2 py-1 rounded-full text-[11px] font-bold">${row.irrigations}x</span>`
                : `<span class="text-[#868685] text-[12px] font-semibold">—</span>`;

            tbody.innerHTML += `
                <tr class="border-b border-[#e8ebe6]/50 hover:bg-[#e8ebe6]/30 transition-colors">
                    <td class="py-3 px-3 text-[14px] font-bold">${row.date}</td>
                    <td class="py-3 px-3 text-[13px] font-semibold text-[#454745]">${row.total_readings}</td>
                    <td class="py-3 px-3">${irrigationBadge}</td>
                    <td class="py-3 px-3 text-[13px] font-semibold">${row.avg_moisture}%</td>
                    <td class="py-3 px-3 text-[13px] font-semibold">${row.avg_temp}°C</td>
                    <td class="py-3 px-3 text-[13px] font-semibold">${row.avg_humidity}%</td>
                    <td class="py-3 px-3 text-[13px] font-semibold">${row.avg_co2} ppm</td>
                </tr>
            `;
        });
    } catch(e) { console.error('Reports fetch error:', e); }
});
</script>
{% endblock %}
