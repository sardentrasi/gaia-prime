{% extends 'base.html' %}
{% block content %}
<div class='p-lg w-full'>
<!-- Header Section -->
<div class="flex justify-between items-end mb-12">
<div>
<h2 class="font-section-heading text-section-heading text-near-black mb-2">Control Center</h2>
<p class="font-body-large text-body-large text-gray-500">Administrative dashboard for manual hardware overrides.</p>
</div>
<!-- Status & Manual Toggle -->
<div class="flex items-center gap-6">
<div class="flex items-center gap-2 bg-surface-container-low px-4 py-2 rounded-full border border-border-subtle">
<div class="w-2.5 h-2.5 rounded-full bg-brand-green animate-pulse"></div>
<span class="font-mono-code text-mono-code text-gray-700">ESP32: Active</span>
</div>
<div class="flex items-center gap-3">
<span class="font-label-uppercase text-label-uppercase text-gray-500">Manual Mode</span>
<button id="btn-manual-mode" type="button" disabled title="Manual mode toggle belum tersedia di backend" class="relative inline-flex h-6 w-11 items-center rounded-full bg-gray-200 transition-colors focus:outline-none focus:ring-2 focus:ring-brand-green focus:ring-offset-2 opacity-60 cursor-not-allowed">
<span class="inline-block h-4 w-4 transform rounded-full bg-white transition-transform translate-x-1 shadow-sm"></span>
</button>
</div>
</div>
</div>
<!-- Action Grid -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
<!-- Card 1 -->
<button id="btn-control-force-water" type="button" class="bg-pure-white rounded-[16px] border border-border-subtle p-md text-left transition-all hover:border-medium hover:shadow-[0_2px_8px_rgba(0,0,0,0.03)] group">
<div class="flex items-start justify-between mb-4">
<div class="w-12 h-12 rounded-full bg-surface-container-low flex items-center justify-center text-primary group-hover:bg-brand-green-light transition-colors">
<span class="material-symbols-outlined" style="font-size: 24px;">water_drop</span>
</div>
<span class="font-mono-code text-mono-code text-gray-400 bg-gray-50 px-2 py-1 rounded-md border border-border-subtle">CMD:PUMP_10</span>
</div>
<h3 class="font-card-title text-card-title text-near-black mb-2">Force Pump (10s)</h3>
<p class="font-body-base text-body-base text-gray-500">Manually engage main irrigation pump for a 10-second duration. Bypasses current schedule.</p>
</button>
<!-- Card 2 -->
<button id="btn-control-reset-cooldown" type="button" class="bg-pure-white rounded-[16px] border border-border-subtle p-md text-left transition-all hover:border-medium hover:shadow-[0_2px_8px_rgba(0,0,0,0.03)] group">
<div class="flex items-start justify-between mb-4">
<div class="w-12 h-12 rounded-full bg-surface-container-low flex items-center justify-center text-info-blue group-hover:bg-blue-50 transition-colors">
<span class="material-symbols-outlined" style="font-size: 24px;">restart_alt</span>
</div>
<span class="font-mono-code text-mono-code text-gray-400 bg-gray-50 px-2 py-1 rounded-md border border-border-subtle">CMD:RST_CLD</span>
</div>
<h3 class="font-card-title text-card-title text-near-black mb-2">Reset Cooldown</h3>
<p class="font-body-base text-body-base text-gray-500">Clear thermal cooldown flags for all high-draw components. Use with caution.</p>
</button>
<!-- Card 3 -->
<button id="btn-control-vision-scan" type="button" class="bg-pure-white rounded-[16px] border border-border-subtle p-md text-left transition-all hover:border-medium hover:shadow-[0_2px_8px_rgba(0,0,0,0.03)] group">
<div class="flex items-start justify-between mb-4">
<div class="w-12 h-12 rounded-full bg-surface-container-low flex items-center justify-center text-tertiary group-hover:bg-tertiary-fixed transition-colors">
<span class="material-symbols-outlined" style="font-size: 24px;">center_focus_strong</span>
</div>
<span class="font-mono-code text-mono-code text-gray-400 bg-gray-50 px-2 py-1 rounded-md border border-border-subtle">CMD:VIS_SCN</span>
</div>
<h3 class="font-card-title text-card-title text-near-black mb-2">Trigger Vision Scan</h3>
<p class="font-body-base text-body-base text-gray-500">Force immediate capture and analysis from overhead canopy cameras.</p>
</button>
<!-- Card 4 -->
<button id="btn-control-reboot" type="button" disabled title="System reboot endpoint belum tersedia" class="bg-pure-white rounded-[16px] border border-border-subtle p-md text-left transition-all hover:border-medium hover:shadow-[0_2px_8px_rgba(0,0,0,0.03)] group border-error-red/20 hover:border-error-red/40 opacity-70 cursor-not-allowed">
<div class="flex items-start justify-between mb-4">
<div class="w-12 h-12 rounded-full bg-error-container/50 flex items-center justify-center text-error-red group-hover:bg-error-container transition-colors">
<span class="material-symbols-outlined" style="font-size: 24px;">power_settings_new</span>
</div>
<span class="font-mono-code text-mono-code text-error-red bg-error-container/30 px-2 py-1 rounded-md border border-error-red/20">CMD:SYS_RBT</span>
</div>
<h3 class="font-card-title text-card-title text-error-red mb-2">System Reboot</h3>
<p class="font-body-base text-body-base text-gray-500">Initiate a hard reset of the primary microcontroller. Will disrupt active schedules.</p>
</button>
</div>
</div>
{% endblock %}
